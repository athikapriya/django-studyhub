{% extends 'base/main.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/authentication/password_reset.css' %}">
{% endblock %}


{% block content %}
<section id="password-reset" class="">
    <div class="container">
        <div class="row">
            <div class="col-12 col-md-10 mx-auto">
                <h1 class="color-text-primary mb-3">Password Reset</h1>
                <p class="color-text-tertiary">Forgotten your password? Enter your email address below, and we’ll email instructions for setting a new one.</p>

                <!-- =============== password reset email form starts =============== -->
                <form action="" method="POST">
                    {% csrf_token %}

                    <div class="mb-3 d-flex flex-column">
                         <label for="email" class="form-label">Enter your email :</label>
                        <input type="email" name="email" id="email" class="form-control form-input-custom" placeholder="Your email address">
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="my-btn">Reset password</button>
                    </div>
                </form>
                <!-- =============== password reset email form starts =============== -->

            </div>
        </div>
    </div>
</section>
{% endblock %}
